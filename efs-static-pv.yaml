apiVersion: v1
kind: PersistentVolume
metadata:
  name: efs-pv-batch-ita
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  csi:
    driver: efs.csi.aws.com
    volumeHandle: fs-06bf736b07c8f9d9a
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: efs-pvc-batch-ita-static
  namespace: kube-system
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: efs-pv-batch-ita
  resources:
    requests:
      storage: 10Gi